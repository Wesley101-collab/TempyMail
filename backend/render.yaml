services:
  - type: web
    name: tempymail-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DB_PATH
        value: /data/emails.db
    disk:
      name: tempymail-db
      mountPath: /data
      sizeGB: 1
